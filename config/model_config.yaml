# A100 80GB — model priority stack
# VRAM budget: 80GB total
# Precision: bfloat16 (native A100 support)

models:
  local:
    wan2:
      enabled: true
      priority: 1
      hf_id: "Wan-AI/Wan2.1-T2V-14B-Diffusers"
      vram_gb: 40
      dtype: bfloat16
      max_frames: 81        # ~5s @ 16fps or ~10s @ 8fps
      fps: 16
      resolution: [1280, 720]
      compile: true         # torch.compile: ~20-30% speedup; image includes 3.10/3.11 dev headers
      flash_attention: true  # FA2 via pipe.transformer.enable_flash_attn(); fallback to xformers
      teacache: true         # Step-skipping cache: ~1.5-2x throughput, minimal quality loss
      teacache_thresh: 0.1   # 0.1=high quality, 0.2=faster, 0.3=fastest
      default_steps: 20      # Flow-matching: 20 steps ≈ 50 steps quality for Wan2
      offload: false
      notes: "Best quality. Primary model."

    hunyuan:
      enabled: true
      priority: 2
      hf_id: "tencent/HunyuanVideo"
      vram_gb: 60
      dtype: bfloat16
      max_frames: 129       # ~5s @ 24fps
      fps: 24
      resolution: [1280, 720]
      compile: true
      flash_attention: true
      offload: false
      notes: "Cinema quality. Use for hero scenes."

    cogvideox:
      enabled: true
      priority: 3
      hf_id: "THUDM/CogVideoX-5b"
      vram_gb: 24
      dtype: bfloat16
      max_frames: 49        # ~6s @ 8fps
      fps: 8
      resolution: [720, 480]
      compile: true
      flash_attention: true
      offload: false
      notes: "Fast. Use for bulk scenes."

    ltx:
      enabled: true
      priority: 4
      hf_id: "Lightricks/LTX-Video"
      vram_gb: 10
      dtype: bfloat16
      max_frames: 121       # ~5s @ 24fps
      fps: 24
      resolution: [768, 512]
      compile: true
      flash_attention: false
      offload: false
      notes: "Fastest. Preview and fallback."

  api:
    runway:
      enabled: true
      version: "gen4.5"
      max_duration: 10
      resolution: [1280, 720]
      use_for: "fallback + hero scenes"

upscaler:
  enabled: true
  model: "RealESRGAN_x4plus"
  target_resolution: [3840, 2160]   # 4K
  tile_size: 512
  device: cuda

generation:
  default_clip_duration: 10         # seconds
  max_clip_duration: 20
  min_clip_duration: 5
  target_fps: 24
  output_resolution: [1920, 1080]   # 1080p; upscale to 4K post
  intermediate_format: mp4
  codec: libx264
  crf: 18
  preset: slow
  cpu_threads: 48

# Quality presets — user selects one; resolution/steps/model are derived.
# Each preset maps to per-model overrides applied at generation time.
quality_presets:
  ultra:
    label: "Ultra (1280×720, max steps)"
    wan2:    { resolution: [1280, 720], steps: 50 }
    hunyuan: { resolution: [1280, 720], steps: 50 }
    cogvideox: { resolution: [720, 480], steps: 50 }
    ltx:     { resolution: [768, 512], steps: 30 }
  high:
    label: "High (1280×720)"
    wan2:    { resolution: [1280, 720], steps: 20 }
    hunyuan: { resolution: [1280, 720], steps: 50 }
    cogvideox: { resolution: [720, 480], steps: 50 }
    ltx:     { resolution: [768, 512], steps: 20 }
  balanced:
    label: "Balanced (848×480, faster)"
    wan2:    { resolution: [848, 480], steps: 20 }
    hunyuan: { resolution: [848, 480], steps: 30 }
    cogvideox: { resolution: [720, 480], steps: 30 }
    ltx:     { resolution: [768, 512], steps: 20 }
  fast:
    label: "Fast (848×480, fewer steps)"
    wan2:    { resolution: [848, 480], steps: 15 }
    hunyuan: { resolution: [848, 480], steps: 20 }
    cogvideox: { resolution: [480, 320], steps: 25 }
    ltx:     { resolution: [512, 320], steps: 15 }
  preview:
    label: "Preview (480×320, draft)"
    wan2:    { resolution: [480, 320], steps: 10 }
    hunyuan: { resolution: [480, 320], steps: 15 }
    cogvideox: { resolution: [480, 320], steps: 20 }
    ltx:     { resolution: [512, 320], steps: 10 }

# A100 80GB — model priority stack
# VRAM budget: 80GB total
# Precision: bfloat16 (native A100 support)

models:
  local:
    wan2_14b:
      enabled: true
      priority: 1
      hf_id: "Wan-AI/Wan2.1-T2V-14B-Diffusers"
      vram_gb: 42
      dtype: bfloat16
      max_frames: 81        # ~5s @ 16fps
      fps: 16
      resolution: [1280, 720]
      compile: false          # disabled: torch.compile SIGSEGV on PyTorch 2.4.1 + CUDA 12.4.1
      sage_attention: false   # disabled: SIGSEGV on first inference step (A100 + PyTorch 2.4.1 + CUDA 12.4.1)
      flash_attention: true   # fallback if SageAttention unavailable
      pab: false
      tea_cache: false
      fb_cache: false
      default_steps: 20
      guidance_scale: 5.0           # official WAN 2.1 default; 10.0 amplifies artifacts
      vae_slicing: false            # keep OFF on A100 80GB — slicing causes stripe artifacts
      offload: false
      negative_prompt: "blurry, out of focus, low resolution, pixelated, compression artifacts, watermark, text overlay, subtitles, logo, distorted, deformed, cartoon, anime, illustration, painting, CGI, 3D render, overexposed, underexposed, washed out, oversaturated, noise, grain, shaky camera, jerky motion, duplicate frames, worst quality, low quality, pitch black, completely dark, black screen, flat black, invisible subject"
      notes: "14B — best quality. PAB + TeaCache + FBCache all enabled. Balanced and Quality strategies."

    wan2_1b:
      enabled: true
      priority: 2
      hf_id: "Wan-AI/Wan2.1-T2V-1.3B-Diffusers"
      vram_gb: 6
      dtype: bfloat16
      max_frames: 81
      fps: 16
      resolution: [1280, 720]
      compile: false          # disabled: torch.compile SIGSEGV on PyTorch 2.4.1 + CUDA 12.4.1
      flash_attention: true
      teacache: true
      teacache_thresh: 0.1
      default_steps: 20
      offload: false
      notes: "1.3B — fast. Used in Fast strategy. ~50s/clip at 1280x720."

    hunyuan:
      enabled: false
      priority: 3
      hf_id: "hunyuanvideo-community/HunyuanVideo"
      vram_gb: 35
      dtype: bfloat16
      quantization: "int8"
      max_frames: 129
      fps: 24
      resolution: [1280, 720]
      compile: false
      flash_attention: true
      offload: false
      negative_prompt: "blurry, out of focus, low resolution, pixelated, compression artifacts, watermark, text overlay, subtitles, logo, distorted, deformed, cartoon, anime, illustration, painting, CGI, 3D render, overexposed, underexposed, washed out, oversaturated, noise, grain, shaky camera, jerky motion, duplicate frames, worst quality, low quality"
      notes: "HunyuanVideo INT8 — hero scenes in Quality strategy."

  api:
    runway:
      enabled: true
      version: "gen4.5"
      max_duration: 10
      resolution: [1280, 720]
      use_for: "fallback + hero scenes"

upscaler:
  enabled: true
  model: "RealESRGAN_x4plus"
  target_resolution: [3840, 2160]   # 4K
  tile_size: 512
  device: cuda

generation:
  default_clip_duration: 10         # seconds
  max_clip_duration: 20
  min_clip_duration: 5
  target_fps: 24
  output_resolution: [1920, 1080]   # 1080p; upscale to 4K post
  intermediate_format: mp4
  codec: libx264
  crf: 18
  preset: slow
  cpu_threads: 48

# ── Generation strategies ─────────────────────────────────────────
# User picks one in the UI. Controls model selection, resolution, steps.
#
#   Fast     → WAN 1.3B at native 1280×720.    ~50s/clip.  12 clips ≈ 10 min.
#   Balanced → WAN 14B  at 848×480 + upscale.  ~90s/clip.  12 clips ≈ 18 min.
#   Quality  → WAN 14B  bulk + Hunyuan INT8 hero.  ~20-25 min total.
#
strategies:
  fast:
    label: "Fast — WAN 1.3B (good quality, ~10 min for 2 min video)"
    description: "All scenes use WAN 1.3B at full 1280×720. Fastest option."
    bulk_model: "wan2_1b"
    hero_model: "wan2_1b"          # no separate hero model
    hero_scene_ids: []             # auto-detect disabled
    gen_resolution: [1280, 720]
    output_resolution: [1280, 720]
    upscale: false
    steps: 20
    clip_duration: 10

  balanced:
    label: "Balanced — WAN 14B 848×480 + Real-ESRGAN upscale to 1280×720"
    description: "WAN 14B at 848×480, Real-ESRGAN upscales to 1280×720. ~8 min/clip."
    bulk_model: "wan2_14b"
    hero_model: "wan2_14b"
    hero_scene_ids: []
    gen_resolution: [848, 480]
    output_resolution: [1280, 720]
    upscale: true
    upscale_method: "realesrgan"
    steps: 30                       # 15 was too few — WAN 14B needs ≥25-30 for clean output
    guidance_scale: 5.0             # official WAN 2.1 default; 10.0 amplified artifacts
    clip_duration: 10

  quality:
    label: "Quality — WAN 14B 1280×720 + Real-ESRGAN upscale to 1080p"
    description: "WAN 14B at native 1280×720, Real-ESRGAN upscales to 1920×1080."
    bulk_model: "wan2_14b"
    hero_model: "wan2_14b"
    hero_scene_ids: "auto"
    gen_resolution: [1280, 720]
    output_resolution: [1920, 1080]
    upscale: true
    upscale_method: "realesrgan"
    steps: 30
    guidance_scale: 5.0             # official WAN 2.1 default
    clip_duration: 10

# Quality presets — used when strategy is NOT set (legacy / CLI fallback).
quality_presets:
  ultra:
    label: "Ultra (1280×720, max steps)"
    wan2_14b: { resolution: [1280, 720], steps: 50 }
    wan2_1b:  { resolution: [1280, 720], steps: 50 }
    hunyuan:  { resolution: [1280, 720], steps: 50 }
  high:
    label: "High (1280×720)"
    wan2_14b: { resolution: [1280, 720], steps: 20 }
    wan2_1b:  { resolution: [1280, 720], steps: 20 }
    hunyuan:  { resolution: [1280, 720], steps: 50 }
  balanced:
    label: "Balanced (848×480, faster)"
    wan2_14b: { resolution: [848, 480], steps: 20 }
    wan2_1b:  { resolution: [848, 480], steps: 20 }
    hunyuan:  { resolution: [848, 480], steps: 30 }
  fast:
    label: "Fast (848×480, fewer steps)"
    wan2_14b: { resolution: [848, 480], steps: 15 }
    wan2_1b:  { resolution: [848, 480], steps: 15 }
    hunyuan:  { resolution: [848, 480], steps: 20 }
  preview:
    label: "Preview (480×320, draft)"
    wan2_14b: { resolution: [480, 320], steps: 10 }
    wan2_1b:  { resolution: [480, 320], steps: 10 }
    hunyuan:  { resolution: [480, 320], steps: 15 }
